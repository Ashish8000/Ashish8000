<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background: linear-gradient(-45deg, #1e1b4b, #311042, #0f172a, #111827);
          background-size: 400% 400%;
          animation: gradient 15s ease infinite, pulse 3s ease-in-out infinite;
          padding: 30px;
          border-radius: 12px;
          text-align: center;
          border: 1px solid rgba(255, 255, 255, 0.1);
          height: 140px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .title {
          color: #ffffff;
          font-size: 24px;
          font-weight: 800;
          margin-bottom: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
          text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
          color: #cbd5e1;
          font-size: 14px;
          font-weight: 500;
          word-spacing: 1px;
        }

        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
          0%, 100% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.3), 0 0 20px rgba(0, 191, 255, 0.1); }
          50% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.6), 0 0 30px rgba(0, 191, 255, 0.3); }
        }
      </style>
      <div class="container">
        <div class="title">⚡ Core Competencies ⚡</div>
        <div class="subtitle">Data Extraction ➔ Feature Engineering ➔ Model Optimization ➔ API Deployment</div>
      </div>
    </div>
  </foreignObject>
</svg>
